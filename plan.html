<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Plan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <header class="p-3">
        <a href="index.html" class="text-decoration-none">
            <i class="fa-solid fa-house text-dark" style="font-size:2em;"></i>
        </a>
    </header>

    <div class="container mt-2 text-center">
        <h1 class="fw-bold text-success h2">BIENVENIDO A TUS PLANES</h1>
        <div id="nombre_plan" class="badge bg-info fs-5 p-3 rounded-pill shadow-sm mt-2">
            <span id="tituloPlan">Cargando plan...</span>
        </div>
    </div>

    <div class="container mt-5">
        <div class="row g-4"> <div class="col-12 col-md-6">
                <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                    <div class="card-header bg-dark text-white p-3 text-center">
                        <h3 class="h5 mb-0"><i class="bi bi-cart-dash me-2"></i>Gastos:</h3>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-striped mb-0" id="tablaGastosPorPlan">
                                <thead class="table-light d-none d-md-table-header-group text-center">
                                    <tr>
                                        <th>Nombre</th>
                                        <th>Tipo</th>
                                        <th>Importe</th>
                                    </tr>
                                </thead>
                                <tbody class="text-center">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-0 p-3">
                        <button id="btAbrirModalCrearGasto" class="btn btn-info w-100 fw-bold">Nuevo Gasto</button>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6">
                <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                    <div class="card-header bg-success text-white p-3 text-center">
                        <h3 class="h5 mb-0"><i class="bi bi-piggy-bank me-2"></i>Ahorros:</h3>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-striped mb-0" id="tablaAhorrosPorPlan">
                                <thead class="table-light d-none d-md-table-header-group text-center">
                                    <tr>
                                        <th>Apunte</th>
                                        <th>Cantidad</th>
                                        <th>Fecha</th>
                                    </tr>
                                </thead>
                                <tbody class="text-center">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-0 p-3">
                        <button id="btAbrirModalCrearAhorro" class="btn btn-success w-100 fw-bold text-white">Registrar Ahorro</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-5 mb-5">
            <div class="col-12 text-center">
                <button id="btAbrirInfoPlan" class="btn btn-dark btn-lg px-5 shadow-lg rounded-pill">
                    <i class="bi bi-info-circle me-2"></i>Ver Info General
                </button>
            </div>
        </div>
    </div>

    <dialog id="modalFormGasto" class="border-0 shadow-lg rounded-4 p-0">
        <form id="formGasto" method="dialog" class="p-4 p-md-5">
            <h3 class="text-center mb-4 text-info fw-bold">Registrar Gasto</h3>
            <div class="mb-3">
                <label class="form-label">¿En qué gastaste?</label>
                <input type="text" class="form-control" name="NombreGasto" required placeholder="Ej: Cena">
            </div>
            <div class="mb-3">
                <label class="form-label">Categoría</label>
                <input type="text" class="form-control" name="TipoGasto" required placeholder="Ej: Comida">
            </div>
            <div class="mb-4">
                <label class="form-label">Importe (€)</label>
                <input type="number" class="form-control" name="GastoNumerico" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-info w-100 fw-bold">Guardar</button>
                <button type="button" id="cerrarFormGasto" class="btn btn-light w-100">Cancelar</button>
            </div>
        </form>
    </dialog>

    <dialog id="modalFormAhorro" class="border-0 shadow-lg rounded-4 p-0">
        <form id="formAhorro" method="dialog" class="p-4 p-md-5">
            <h3 class="text-center mb-4 text-success fw-bold">Nuevo Ahorro</h3>
            <div class="mb-3">
                <label class="form-label">Concepto</label>
                <input type="text" class="form-control" name="Apunte" required placeholder="Ej: Ahorro Semanal">
            </div>
            <div class="mb-3">
                <label class="form-label">Cantidad (€)</label>
                <input type="number" step="0.01" class="form-control" name="Dinero_ahorrado" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Fecha</label>
                <input type="date" class="form-control" name="Fecha_creacion" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success text-white w-100 fw-bold">Guardar</button>
                <button type="button" id="cerrarFormAhorro" class="btn btn-light w-100">Cancelar</button>
            </div>
        </form>
    </dialog>

    <script type="module" src="app.js"></script>
</body>
</html>
