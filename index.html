<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TitiLove - Finanzas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <header class="p-3">
        <a href="index.html" class="text-decoration-none">
            <i class="fa-solid fa-house text-dark" style="font-size:2em;"></i>
        </a>
    </header>

    <div class="container mt-2 text-center">
        <div class="row">
            <div class="col-12">
                <h1 class="fw-bold text-success h2">TitiLove: Registro de finanzas</h1>
            </div>
        </div>
    </div>

    <div class="container my-4">
        <div class="row g-2 align-items-center justify-content-center">
            <div class="col-5 p-3 bg-info rounded text-center fw-bold text-white shadow-sm">Zaira</div>
            <div class="col-2 d-flex justify-content-center">
                <div class="p-2 border rounded-circle shadow-sm bg-light d-flex align-items-center justify-content-center" style="width: 55px; height: 55px;">
                    <i class="bi bi-heart-fill text-danger fs-3 animate-heart"></i>
                </div>
            </div>
            <div class="col-5 p-3 bg-info rounded text-center fw-bold text-white shadow-sm">Esteve</div>
        </div>
    </div>


    <!--CONTENEDOR DE PLANES CREADOS-->

    <div class="container">
        <div class="row">
            <div class="col-12">
                <h2 class="text-center mb-3 h4">Planes de el Rey y la Reina</h2>
                <div class="table-responsive shadow-sm rounded">
                    <table class="table table-striped table-bordered mb-0" id="tablaPlanes">
                        <thead class="table-dark d-none d-md-table-header-group">
                            <tr class="text-center bg-info">
                                <th class="bg-info text-dark">Nombre</th>
                                <th class="bg-info text-dark">Necesario</th>
                                <th class="bg-info text-dark">Gasto Máximo</th>
                                <th class="bg-info text-dark">Fecha</th>
                                <th class="bg-info text-dark">Presupuesto</th>
                            </tr>
                        </thead>
                        <tbody class="text-center" id="cuerpoTabla">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="container mt-4 mb-5">
        <div class="row g-3 justify-content-center">
            <div class="col-12 col-sm-6">
                <button id="btAbrirModalCrearPlan" class="btn btn-info w-100 fw-bold shadow-sm">Crear nuevo plan</button>
            </div>
            <div class="col-12 col-sm-6">
                <button id="btAbrirModalEliminarPlan" onclick="eliminarPlanesSeleccionados()" class="btn btn-outline-danger w-100 fw-bold shadow-sm">Eliminar Seleccionados</button>
            </div>
        </div>
    </div>

    <dialog id="modalForm" class="border-0 shadow-lg rounded-4 p-0">
        <form id="formPlan" method="dialog" class="p-4 p-md-5">
            <h3 class="text-center mb-4 text-info fw-bold">Nuevo Registro</h3>
            <div class="mb-3">
                <label class="form-label">Nombre del Plan</label>
                <input type="text" class="form-control" name="NombrePlan" required>
            </div>
            <div class="row">
                <div class="col-6 mb-3">
                    <label class="form-label">Dinero necesario</label>
                    <input type="number" class="form-control" name="DineroNecesario" required>
                </div>
                <div class="col-6 mb-3">
                    <label class="form-label">Presupuesto</label>
                    <input type="number" class="form-control" name="PresupuestoPlan" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Fecha</label>
                <input type="date" class="form-control" name="FechaPlan" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Gasto Máximo</label>
                <input type="number" class="form-control" name="GastoMaxPlan" required>
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" id="CrearPlan" class="btn btn-info w-100 fw-bold">Enviar</button>
                <button type="button" id="cerrarForm" class="btn btn-light w-100">Cancelar</button>
            </div>
        </form>
    </dialog>

    <script type="module" src="app.js"></script>
</body>
</html>
