<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="titulo">TitiLove - Finanzas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="style.css" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function(){ emailjs.init("Q2zgLNIVsJGbeCy3F"); })();
    </script>
</head>
<body>
    <header class="p-3">
        <a href="index.html" class="text-decoration-none">
            <i class="fa-solid fa-house text-dark" style="font-size:2em;"></i>
        </a>
    </header>

    <div class="container mt-2 text-center">
        <h1 class="fw-bold text-dark h1">TITILOVE- EL VIAJE DEL AMOR</h1>
    </div>

    <div class="container my-4">
        <div class="row g-2 align-items-center justify-content-center">
            <div class="col-5 p-3 bg-danger rounded text-center fw-bold text-white border" style="box-shadow: 0 .5rem 1rem rgba(0, 0, 5, 0.15) !important;">ZAIRA</div>
            <div class="col-2 d-flex justify-content-center position-relative">
                <div id="flechaGuia" class="position-absolute" style="top: -50px;">
                    <i class="bi bi-arrow-down-short fs-1 text-danger animate-bounce"></i>
                </div>
                <div id="btnCorazon" class="p-2 border rounded-circle shadow-sm bg-light d-flex align-items-center justify-content-center" style="width: 55px; height: 55px; cursor: pointer; z-index: 10;">
                    <i class="bi bi-heart-fill text-danger fs-3 animate-heart"></i>
                </div>
            </div>
            <div class="col-5 p-3 bg-danger rounded text-center fw-bold text-white shadow-sm border">ESTEVE</div>
        </div>
    </div>

    <div id="bienvenidaAmor" class="container text-center my-5" style="display: none;">
        <div class="card border-0 shadow-lg p-4 bg-white rounded-4">
            <img src="/img/reyes.jpeg" class="rounded-circle mx-auto mb-3 border border-danger p-2" style="width: 350px; height: 350px; object-fit: cover;">
            <h2 class="display-6 text-danger" style="font-family: 'Great Vibes', cursive;">¡Bienvenidos a nuestro viaje!</h2>
            <p class="lead">Mi reina, aquí haremos realidad nuestros sueños y planes juntos a futuro!</p>
            <button id="btnSeguir" class="btn btn-danger btn-lg px-5 rounded-pill shadow">Seguir al viaje <i class="bi bi-arrow-right"></i></button>
        </div>
    </div>

    <div id="seccionPlanes" style="display: none;">
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <h2 class="text-center mb-3 h4">Planes de el Rey y la Reina</h2>
                    <div class="table-responsive shadow-sm rounded">
                        <table class="table table-striped table-bordered mb-0" id="tablaPlanes">
                            <thead class="table-dark">
                                <tr class="text-center">
                                    <th class="bg-danger text-white">NOMBRE</th>
                                    <th class="bg-danger text-white">NECESARIO</th>
                                    <th class="bg-danger text-white">GASTO MÁXIMO</th>
                                    <th class="bg-danger text-white">FECHA</th>
                                    <th class="bg-danger text-white">PRESUPUESTO</th>
                                    <th class="bg-danger text-white">ACCIÓN</th>
                                    <th class="bg-danger text-white">BORRAR</th>
                                </tr>
                            </thead>
                            <tbody class="text-center" id="cuerpoTabla"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="container mt-4 mb-5">
            <div class="row g-3 justify-content-center text-center">
                <div class="col-12 text-center col-sm-6">
                    <button id="btAbrirModalCrearPlan" class="btn btn-dark w-100 fs-5 fw-bold shadow-sm">CREAR NUEVO PLAN</button>
                </div>
            </div>
            <div class="row g-3 justify-content-center text-center mt-3">
                <div class="col-12 col-sm-6">
                    <button id="btnEliminarVarios" onclick="eliminarPlanesSeleccionados()" class="btn btn-danger w-100 fw-bold" style="display: none;">Eliminar Seleccionados</button>
                </div>
            </div>
        </div>
    </div>

    <dialog id="modalForm" class="border-0 shadow-lg rounded-4 p-0">
        <form id="formPlan" method="dialog" class="p-4 p-md-5">
            <h3 class="text-center mb-4 text-danger fw-bold">Nuevo Registro</h3>
            <div class="mb-3 text-start">
                <label class="form-label text-danger">Nombre del Plan</label>
                <input type="text" class="form-control" name="NombrePlan" required>
            </div>
            <div class="row text-start">
                <div class="col-6 mb-3">
                    <label class="form-label text-danger">Dinero necesario</label>
                    <input type="number" class="form-control" name="DineroNecesario" required>
                </div>
                <div class="col-6 mb-3"> 
                    <label class="form-label text-danger">Presupuesto</label>
                    <input type="number" class="form-control" name="PresupuestoPlan" required>
                </div>
            </div>
            <div class="mb-3 text-start"> 
                <label class="form-label text-danger">Fecha</label>
                <input type="date" class="form-control" name="FechaPlan" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label text-danger">Gasto Máximo</label>
                <input type="number" class="form-control" name="GastoMaxPlan" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger w-100 fw-bold">Enviar</button>
                <button type="button" id="cerrarForm" class="btn btn-danger w-100">Cancelar</button>
            </div>
        </form>
    </dialog>

    <script type="module" src="app.js"></script>
</body>
</html>
